AWSTemplateFormatVersion: '2010-09-09'
Description: MedSafe Database Stack Deployment

Parameters:
  DockerImageTag:
    Type: String

  ApiPort:
    Type: Number
    Default: 3002

  DbConnectionString:
    Type: String
    NoEcho: true

  MyIP:
    Type: String
    Description: Your public IP for SSH access (format: X.X.X.X/32)

Resources:
  MedSafeBackendSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MedSafe Database Service
      VpcId: vpc-0d3b446d45264fea7  # sua VPC padrão
      SecurityGroupIngress:
        # Porta da API (pública)
        - IpProtocol: tcp
          FromPort: !Ref ApiPort
          ToPort: !Ref ApiPort
          CidrIp: 0.0.0.0/0

        # Porta SSH (somente seu IP)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP

      Tags:
        - Key: Name
          Value: medsafe-backend-sg

  DatabaseStackEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: ami-0bde73fd629657a59
      SecurityGroupIds:
        - !Ref MedSafeBackendSG
      Tags:
        - Key: Name
          Value: medsafe-database-ec2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install -y docker
          systemctl enable docker
          systemctl start docker

          docker pull devjoaosg/medsafe-database-service:${DockerImageTag}

          docker stop medsafe-database-service || true
          docker rm medsafe-database-service || true

          docker run -d \
            --restart=always \
            --name medsafe-database-service \
            -p ${ApiPort}:${ApiPort} \
            -e DB_CONNECTION_STRING="${DbConnectionString}" \
            devjoaosg/medsafe-database-service:${DockerImageTag}

Outputs:
  PublicIP:
    Description: Public IP of the API instance
    Value: !GetAtt DatabaseStackEC2.PublicIp
