AWSTemplateFormatVersion: '2010-09-09'
Description: MedSafe Database Service Deployment

Parameters:
  DockerImageTag:
    Type: String
  ApiPort:
    Type: Number
    Default: 3002
  DbConnectionString:
    Type: String
    NoEcho: true

Resources:
  DatabaseServiceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MedSafe Database API
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApiPort
          ToPort: !Ref ApiPort
          CidrIp: 0.0.0.0/0

  DatabaseServiceEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: ami-0a5b3df1cd80ab831
      SecurityGroupIds:
        - !Ref DatabaseServiceSG
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install -y docker
          systemctl enable docker
          systemctl start docker

          # Pull da imagem
          docker pull devjoaosg/medsafe-database-service:${DockerImageTag}

          # Remover container anterior
          docker stop medsafe-database-service || true
          docker rm medsafe-database-service || true

          # Rodar container
          docker run -d \
            --restart=always \
            --name medsafe-database-service \
            -p ${ApiPort}:${ApiPort} \
            -e DB_CONNECTION_STRING="${DbConnectionString}" \
            devjoaosg/medsafe-database-service:${DockerImageTag}

Outputs:
  PublicIP:
    Description: Public IP of the API instance
    Value: !GetAtt DatabaseServiceEC2.PublicIp
