AWSTemplateFormatVersion: '2010-09-09'
Description: MedSafe Database Service Stack Deployment (EC2 + EIP + Docker + CloudWatch Logs + Script de Atualização)

Parameters:
  ApiPort:
    Type: Number
    Default: 5000
  NodeEnv:
    Type: String
    Default: production
  ServiceName:
    Type: String
    Default: database-service
  FrontUrl:
    Type: String
    Default: http://177.16.162.33
  CorsOrigins:
    Type: String
    Default: http://177.16.162.33
  EC2KeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Default: medsafe-prod-key
  VpcId:
    Type: String
    Default: vpc-0d3b446d45264fea7
  SubnetId:
    Type: String
    Default: subnet-0ac4c6abfbd794fdf
  DBConnectionString:
    Type: String
    NoEcho: true
  JWTSecret:
    Type: String
    NoEcho: true
  XAuthServiceApiKey:
    Type: String
    NoEcho: true

Resources:

  # Security Group
  DatabaseServiceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MedSafe Database Service API
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApiPort
          ToPort: !Ref ApiPort
          CidrIp: 177.16.162.33/32
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 177.16.162.33/32

  # IAM Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - MedSafe-DatabaseService

  # CloudWatch Log Group
  DatabaseServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /medsafe/database-service
      RetentionInDays: 30

  # EC2 Instance
  DatabaseServiceEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref EC2KeyPair
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref DatabaseServiceSG
      ImageId: ami-0484b27e9143d1299
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: medsafe-database-service
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Instala Docker
          sudo apt update -y
          sudo apt install -y docker.io
          sudo systemctl enable docker
          sudo systemctl start docker

          # Script de atualização do container
          cat <<'EOF' > /home/ubuntu/update-container.sh
          #!/bin/bash
          set -e
          echo "Atualizando container MedSafe Database Service..."
          docker pull devjoaosg/medsafe-database-service:latest
          docker stop medsafe-database-service || true
          docker rm medsafe-database-service || true
          docker run -d -p 80:5000 --restart=always --name medsafe-database-service -p ${ApiPort}:${ApiPort} \
            -e NODE_ENV=${NodeEnv} \
            -e PORT=${ApiPort} \
            -e SERVICE_NAME=${ServiceName} \
            -e FRONT_URL=${FrontUrl} \
            -e CORS_ORIGINS=${CorsOrigins} \
            -e DB_CONNECTION_STRING=${DBConnectionString} \
            -e JWT_SECRET=${JWTSecret} \
            -e DATABASE_SERVICE_X_AUTH_SERVICE_API_KEY=${XAuthServiceApiKey} \
            --log-driver=awslogs \
            --log-opt awslogs-group=/medsafe/database-service \
            --log-opt awslogs-region=sa-east-1 \
            --log-opt awslogs-stream=database-service \
            devjoaosg/medsafe-database-service:latest
          EOF

          chmod +x /home/ubuntu/update-container.sh

          # Rodar pela primeira vez
          /home/ubuntu/update-container.sh

  # Elastic IP
  DatabaseServiceEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  # EIP Association
  DatabaseServiceEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref DatabaseServiceEC2Instance
      AllocationId: eipalloc-0c95ae1750ad0954d

Outputs:
  SecurityGroupId:
    Description: ID do Security Group
    Value: !Ref DatabaseServiceSG

  EC2PublicIP:
    Description: IP público fixo da EC2
    Value: !Ref DatabaseServiceEIP
