AWSTemplateFormatVersion: '2010-09-09'
Description: MedSafe Database Stack Deployment

Parameters:
  ApiPort:
    Type: Number
    Default: 443
  DbConnectionString:
    Type: String
    NoEcho: true
  NodeEnv:
    Type: String
    Default: production
  Port:
    Type: Number
    Default: 443
  ServiceName:
    Type: String
    Default: database-service
  FrontUrl:
    Type: String
    Default: http://177.16.162.33
  DatabaseApiKey:
    Type: String
    NoEcho: true
  JwtSecret:
    Type: String
    NoEcho: true
  CorsOrigins:
    Type: String
    Default: http://177.16.162.33
  RequestTimeoutMs:
    Type: Number
    Default: 7000
  EC2KeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Nome do par de chaves para acesso SSH
    Default: medsafe-prod-key
  ExistingEC2Id:
    Type: String
    Description: "ID da EC2 existente (já criada manualmente)"

Resources:
  DatabaseServiceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MedSafe Database API
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApiPort
          ToPort: !Ref ApiPort
          CidrIp: 177.16.162.33/32
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 177.16.162.33/32

  DatabaseStackEC2UserData:
    Type: AWS::EC2::Instance
    Properties:
      InstanceId: !Ref ExistingEC2Id
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Atualiza pacotes e instala dependências
          apt update -y
          apt install -y ca-certificates curl gnupg lsb-release apt-transport-https software-properties-common

          # Instala Docker oficial
          mkdir -p /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
          apt update -y
          apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

          # Habilita e inicia Docker
          systemctl enable docker
          systemctl start docker

          # Pull da imagem com tag fixa
          docker pull devjoaosg/medsafe-database-service:1f263ad6b2a4814d1104c2946692b317701df9db

          # Remove container antigo
          docker stop medsafe-database-service || true
          docker rm medsafe-database-service || true

          # Roda container com tag fixa
          docker run -d \
            --restart=always \
            --name medsafe-database-service \
            -p ${ApiPort}:${ApiPort} \
            -e NODE_ENV=${NodeEnv} \
            -e PORT=${Port} \
            -e SERVICE_NAME=${ServiceName} \
            -e FRONT_URL=${FrontUrl} \
            -e DATABASE_SERVICE_X_AUTH_SERVICE_API_KEY=${DatabaseApiKey} \
            -e JWT_SECRET=${JwtSecret} \
            -e DB_CONNECTION_STRING="${DbConnectionString}" \
            -e CORS_ORIGINS=${CorsOrigins} \
            -e REQUEST_TIMEOUT_MS=${RequestTimeoutMs} \
            devjoaosg/medsafe-database-service:1f263ad6b2a4814d1104c2946692b317701df9db

Outputs:
  PublicIP:
    Description: Public IP of the API instance
    Value: !GetAtt DatabaseStackEC2.PublicIp
