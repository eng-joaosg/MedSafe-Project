AWSTemplateFormatVersion: '2010-09-09'
Description: MedSafe Database Stack Deployment (EC2 imutável com variáveis do GitHub Secrets)

Parameters:
  ApiPort:
    Type: Number
    Default: 5000
  NodeEnv:
    Type: String
    Default: production
  ServiceName:
    Type: String
    Default: database-service
  FrontUrl:
    Type: String
    Default: http://177.16.162.33
  CorsOrigins:
    Type: String
    Default: http://177.16.162.33
  RequestTimeoutMs:
    Type: Number
    Default: 7000
  EC2KeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Default: medsafe-prod-key
  VpcId:
    Type: String
    Default: vpc-0d3b446d45264fea7
  SubnetId:
    Type: String
    Default: subnet-0ac4c6abfbd794fdf
  IAMRoleName:
    Type: String
    Default: MedSafe-DatabaseService
  DBConnectionString:
    Type: String
    NoEcho: true
  JWTSecret:
    Type: String
    NoEcho: true
  XAuthServiceApiKey:
    Type: String
    NoEcho: true

Resources:
  DatabaseServiceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MedSafe Database API
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApiPort
          ToPort: !Ref ApiPort
          CidrIp: 177.16.162.33/32
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 177.16.162.33/32

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref IAMRoleName

  DatabaseEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref EC2KeyPair
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref DatabaseServiceSG
      ImageId: ami-077aec33f15de0896  # Ubuntu 22.04 LTS
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: medsafe-database-service
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt update -y
          apt install -y docker.io
          systemctl enable docker
          systemctl start docker

          docker pull devjoaosg/medsafe-database-service:db5847052764a3811ac07dd06f9f395ccdeea4d9
          
          docker stop medsafe-database-service || true
          docker rm medsafe-database-service || true
          
          docker run -d \
            --restart=always \
            --name medsafe-database-service \
            -p ${ApiPort}:${ApiPort} \
            -e NODE_ENV=${NodeEnv} \
            -e PORT=${ApiPort} \
            -e SERVICE_NAME=${ServiceName} \
            -e FRONT_URL=${FrontUrl} \
            -e CORS_ORIGINS=${CorsOrigins} \
            -e DB_CONNECTION_STRING=${DBConnectionString} \
            -e JWT_SECRET=${JWTSecret} \
            -e DATABASE_SERVICE_X_AUTH_SERVICE_API_KEY=${XAuthServiceApiKey} \
            devjoaosg/medsafe-database-service:db5847052764a3811ac07dd06f9f395ccdeea4d9

Outputs:
  SecurityGroupId:
    Description: "ID do Security Group"
    Value: !Ref DatabaseServiceSG

  EC2PublicIP:
    Description: "IP público da nova EC2"
    Value: !GetAtt DatabaseEC2Instance.PublicIp
