AWSTemplateFormatVersion: '2010-09-09'
Description: MedSafe Database Stack Deployment

Parameters:
  DockerImageTag:
    Type: String
  ApiPort:
    Type: Number
    Default: 443
  DbConnectionString:
    Type: String
    NoEcho: true
  NodeEnv:
    Type: String
    Default: production
  Port:
    Type: Number
    Default: 443
  ServiceName:
    Type: String
    Default: database-service
  FrontUrl:
    Type: String
    Default: http://177.16.162.33
  DatabaseApiKey:
    Type: String
    NoEcho: true
  JwtSecret:
    Type: String
    NoEcho: true
  CorsOrigins:
    Type: String
    Default: http://177.16.162.33
  RequestTimeoutMs:
    Type: Number
    Default: 7000

Resources:
  # Security Group da EC2
  DatabaseServiceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MedSafe Database API
      SecurityGroupIngress:
        # Acesso à API
        - IpProtocol: tcp
          FromPort: !Ref ApiPort
          ToPort: !Ref ApiPort
          CidrIp: 177.16.162.33/32
        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 177.16.162.33/32

  # Instância EC2
  DatabaseStackEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: ami-0bde73fd629657a59
      SecurityGroupIds:
        - !Ref DatabaseServiceSG
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Atualização e instalação do Docker
          dnf update -y
          dnf install -y docker
          systemctl enable docker
          systemctl start docker

          # Pull da imagem
          docker pull devjoaosg/medsafe-database-service:${DockerImageTag}

          # Remover container antigo
          docker stop medsafe-database-service || true
          docker rm medsafe-database-service || true

          # Rodar container com variáveis de ambiente
          docker run -d \
            --restart=always \
            --name medsafe-database-service \
            -p ${ApiPort}:${ApiPort} \
            -e NODE_ENV=${NodeEnv} \
            -e PORT=${Port} \
            -e SERVICE_NAME=${ServiceName} \
            -e FRONT_URL=${FrontUrl} \
            -e DATABSE_SERVICE_X_AUTH_SERVICE_API_KEY=${DatabaseApiKey} \
            -e JWT_SECRET=${JwtSecret} \
            -e DB_CONNECTION_STRING="${DbConnectionString}" \
            -e CORS_ORIGINS=${CorsOrigins} \
            -e REQUEST_TIMEOUT_MS=${RequestTimeoutMs} \
            devjoaosg/medsafe-database-service:${DockerImageTag}

Outputs:
  PublicIP:
    Description: Public IP of the API instance
    Value: !GetAtt DatabaseStackEC2.PublicIp
