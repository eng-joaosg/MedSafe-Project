AWSTemplateFormatVersion: '2010-09-09'
Description: MedSafe Database Stack Deployment (aplica SG à EC2 existente)

Parameters:
  ApiPort:
    Type: Number
    Default: 443
  DbConnectionString:
    Type: String
    NoEcho: true
  NodeEnv:
    Type: String
    Default: production
  Port:
    Type: Number
    Default: 443
  ServiceName:
    Type: String
    Default: database-service
  FrontUrl:
    Type: String
    Default: http://177.16.162.33
  DatabaseApiKey:
    Type: String
    NoEcho: true
  JwtSecret:
    Type: String
    NoEcho: true
  CorsOrigins:
    Type: String
    Default: http://177.16.162.33
  RequestTimeoutMs:
    Type: Number
    Default: 7000
  EC2KeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Default: medsafe-prod-key
  ExistingEC2Id:
    Type: String
    Default: i-07694bdb7e64088e2
    Description: "ID da EC2 existente (medsafe-database-service)"

Resources:
  DatabaseServiceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for MedSafe Database API
      VpcId: vpc-0d3b446d45264fea7
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ApiPort
          ToPort: !Ref ApiPort
          CidrIp: 177.16.162.33/32
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 177.16.162.33/32

  AttachSGtoExistingEC2:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DatabaseServiceSG
      IpProtocol: -1
      SourceSecurityGroupId: !Ref DatabaseServiceSG
      Description: "Attach SG to existing EC2"

Outputs:
  SecurityGroupId:
    Description: "ID do Security Group"
    Value: !Ref DatabaseServiceSG

  ExistingEC2PublicIP:
    Description: "IP público da EC2 existente"
    Value: 54.94.6.220
