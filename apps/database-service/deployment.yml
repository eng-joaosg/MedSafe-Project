apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-service-api
  labels:
    app: database-service-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: database-service-api
  template:
    metadata:
      labels:
        app: database-service-api
    spec:
      containers:
        - name: database-service-api
          image: devjoaosg/medsafe-database-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: connectionString
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      imagePullSecrets:
        - name: dockerhub-secret
---
apiVersion: v1
kind: Service
metadata:
  name: database-service-api
spec:
  type: ClusterIP
  selector:
    app: database-service-api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  connectionString: "postgres://user:password@host:5432/medsafe_db"
