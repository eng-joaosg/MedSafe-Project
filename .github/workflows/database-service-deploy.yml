name: Deploy Database Service API

on:
  push:
    branches:
      - Database-Service-PROD

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
      uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Instalar dependências
      - name: Install dependencies
        working-directory: apps/database-service
        run: npm install

      # 4. Build do projeto
      - name: Build project
        working-directory: apps/database-service
        run: npm run build

      # 5. Login no Docker Hub (FALTAVA AQUI)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Build da imagem
      - name: Build Docker image
        working-directory: apps/database-service
        run: |
          docker build -t devjoaosg/medsafe-database-service:latest .
          docker tag devjoaosg/medsafe-database-service:latest devjoaosg/medsafe-database-service:${{ github.sha }}

      # 7. Push da imagem
      - name: Push Docker image
        run: |
          docker push devjoaosg/medsafe-database-service:latest
          docker push devjoaosg/medsafe-database-service:${{ github.sha }}

      # 8. Configurar AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 9. Deploy CloudFormation
      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --stack-name MedSafe-Database-Service \
            --template-file infrastructure/cloudformation.yml \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides DockerImageTag=${{ github.sha }}

      # 10. Logs CloudFormation
      - name: Show CloudFormation events
        run: |
          aws cloudformation describe-stack-events \
            --stack-name MedSafe-Database-Service \
            --max-items 20
