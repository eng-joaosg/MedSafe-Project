name: Deploy Database Service API

on:
  push:
    branches:
      - Database-Service-PROD

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Cache de dependências npm
      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: apps/database-service/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('apps/database-service/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4. Instalar dependências
      - name: Install dependencies
        working-directory: apps/database-service
        run: npm ci

      # 5. Lint (opcional, mas recomendado)
      - name: Run lint
        working-directory: apps/database-service
        run: npm run lint

      # 6. Rodar testes
      - name: Run tests
        working-directory: apps/database-service
        run: npm test

      # 7. Build da API
      - name: Build API
        working-directory: apps/database-service
        run: npm run build

      # 8. Build Docker image com SHA + latest
      - name: Build Docker image
        working-directory: apps/database-service
        run: |
          docker build -t usuario/medsafe-database-service:latest \
                       -t usuario/medsafe-database-service:${{ github.sha }} .

      # 9. Login no DockerHub
      - name: Docker login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # 10. Push Docker image
      - name: Push Docker image
        run: |
          docker push usuario/medsafe-database-service:latest
          docker push usuario/medsafe-database-service:${{ github.sha }}

      # 11. Configurar AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      # 12. Deploy via CloudFormation
      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file infra/database-service/template.yml \
            --stack-name MedSafe-Database-API-Stack \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              KeyName=${{ secrets.EC2_KEY_NAME }} \
              InstanceType=t3.micro \
              ApiPort=3000 \
              DbConnectionString=${{ secrets.DB_CONNECTION_STRING }} \
              DockerImageTag=${{ github.sha }} \
              AllowedIP=0.0.0.0/0 \
            --no-fail-on-empty-changeset

      # 13. Debug caso CloudFormation falhe
      - name: Debug CloudFormation failure
        if: failure()
        run: |
          aws cloudformation describe-stack-events \
            --stack-name MedSafe-Database-API-Stack \
            --max-items 20
