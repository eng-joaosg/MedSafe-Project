name: Deploy Database Service API

on:
  push:
    branches:
      - Database-Service-PROD

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Instala dependências
      - name: Install dependencies
        run: npm ci

      # 4. Build do projeto
      - name: Build project
        run: npm run build

      # 5. Login no AWS (APÓS build e ANTES de qualquer comando AWS)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 6. Build da imagem Docker
      - name: Build Docker image
        run: |
          docker build -t devjoaosg/medsafe-database-service:latest .
          docker tag devjoaosg/medsafe-database-service:latest devjoaosg/medsafe-database-service:${{ github.sha }}

      # 7. Push para Docker Hub (imagem pública, sem login)
      - name: Push Docker image
        run: |
          docker push devjoaosg/medsafe-database-service:latest
          docker push devjoaosg/medsafe-database-service:${{ github.sha }}

      # 8. Deploy via CloudFormation
      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --stack-name MedSafe-Database-Service \
            --template-file infrastructure/cloudformation.yml \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides DockerImageTag=${{ github.sha }}

      # 9. Logs de eventos
      - name: Show CloudFormation events
        run: |
          aws cloudformation describe-stack-events \
            --stack-name MedSafe-Database-Service \
            --max-items 20
